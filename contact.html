<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifólio - Daniel Adelino</title>

    <link href="css/uicons-regular-chubby.css" rel="stylesheet">
    <link href="css/uicons-brands.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">

</head>

<body>
    <div id="container">
        <header>
            <div class="logo">
                <img src="img/lg-3.png" alt="">
                <h2>aniel Adelino</h2>

            </div>

            <nav>
                <ul>
                    <li><a href="#" class="nav-feature">Ínicio</a></li>
                    <li><a href="#">Sobre Mim</a></li>
                    <li><a href="#">Tecnologias</a></li>
                    <li><a href="#">Projectos</a></li>
                    <li><a href="#">Carreira</a></li>
                    <li><a href="#" class="nav-feature-2">Contacta-me</a></li>
                </ul>
            </nav>

            <div class="night-mode">
                <button class="night-light"><i class="fi-rc-moon"></i></button>
                <button class="lang">
                    <img src="img/pt-flag.svg" width="22" alt="">
                </button>

            </div>
        </header>

        <div class="line"></div>

        <main>

            <section>
                <div class="contact"> 
                    <form action="#">
                        <label for="name">Nome</label><br>
                        <input type="text" name="name" id="name"><br>
                        <label for="email">Email</label><br>
                        <input type="email" name="email" id="email"><br>
                        <label for="message">Mensagem</label><br>
                        <textarea name="message" id="message" rows="cols"></textarea><br>
                        <button>Enviar</button>
                    </form>
                </div>
                <div class="image">
                    <img src="img/ft-2.png" alt="" width="350" height="350">
                </div>
            </section>

        </main>

        <footer></footer>


    </div>

    <script src="js/script.js"></script>
</body>

</html>
